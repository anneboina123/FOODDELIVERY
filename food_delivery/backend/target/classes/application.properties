spring.application.name=food-delivery

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/food_delivery?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — 'update' adds new columns (like status_updated_at) automatically on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Jackson — prevent 500s on Hibernate proxy beans
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Server
server.port=8080

# JWT
jwt.secret=FoodDeliverySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024
jwt.expiration=86400000

# Logging
logging.level.com.fooddelivery=DEBUG
logging.level.com.fooddelivery.scheduler=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
